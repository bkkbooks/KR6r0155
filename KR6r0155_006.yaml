body:
  text: 上都長安西明寺沙門釋圓照集凡二十二首答制一十一首總三十三首監使李憲誠進金字法華經表一首并答賀平李靈曜表一首僧元晈請度僧表一首僧常清謝贈物表一首沙門崇惠登刀梯歌一首并序沙門崇惠登刀梯頌一首并序沙門崇惠謝賜紫表一首并答恩命拂拭京城諸寺塔像訖進表一首并答進興善寺文殊閣內外功德數表一首并答恩賜綿綵縑緗共四十匹謝表一首并答肅宗恩命三藏弟子惠䏏等入內道場念誦制一首恩旨令三藏弟子僧惠曉為國念誦制一首代宗恩旨命西明寺給粥飯往來騎乘制一首往五臺山修功德辭聖思表一首并答恩命令與惠朗同修功德謝表一首并答元日獻甄叔迦寶表一首并答八月十三日賜手詔一首進五臺山修護摩功德表一首并答敕大興善寺都維那法高依前句當制一首謝恩命令有則法師於興善寺開講表一首并答謝制補沙門惠朗充興善寺上座表一首并答唐贈司空大辨正廣智不空三藏和上碑一首嚴郢文進金字妙法蓮華經表一首臣憲誠言臣聞子得一善必獻其父臣得一善必獻其君然金字法華經者鷲嶺垂文傳真貝葉龍宮寫妙取況蓮花故軸以珍奇書以金字勢分垂露光動繁星開卷受持比百花之發春樹披文演説若群鴻之起滄海清滌五濁莊嚴六根謹於元日跪而奉進以表吉祥伏願均如來之壽延陛下之昌期無任犬馬懇欵之至謹奉進以聞臣憲誠誠惶誠恐頓首頓首謹言大曆十三年正月一日元從朝散大夫行內侍省內給事賜緋魚袋上柱國李憲誠表進寶應元聖文武皇帝答曰汝以近臣監修功德履新之慶能致妙經開卷粲然深可嘉尚也所進知賀平李靈曜表一首臣遷言伏聞滑亳節度使勉等恭承睿謀順行天罰靈曜擒虜田恍敗亡掃河右之煙塵收大梁之州縣救蒼生塗炭之苦宣皇情惻隱之慈萬國同歡兆人相賀彰宗廟之靈貺昭聖主之威神臣之庸微幸逢聖代聞斯大慶抃躍無任謹附中使李憲誠奉表陳賀以聞臣遷誠欣誠喜謹言大曆十一年十月二十九日前左領軍衛丘曹翰林待詔臣趙遷表上沙門元晈請度僧表一首沙門元晈附起居伏惟聖躬萬福元晈生居福州偏方賤品長年多幸侍從鑾輿自靈武還京遇承明佛事稟先師遺訓許國忘軀慚無絲髮之功已及從心之歲身纏痾瘵侍養無人仰思聖慈曲賜哀恤有姪孝常早承天澤謬列崇班誠無報國之勞志有出家之行元晈知其實業舉不避親雖處居家常勤誦習伏惟聖恩傍及特乞殊私冀竭殘形永希上答無任懇懼之至謹因降誕之辰謹附中使魏行林陳請以聞如天恩允許請宣付所司謹具腳色如後沙門元晈誠惶誠恐謹言大曆十三年十月九日前長生殿道場念誦僧保壽寺主沙門元晈上表謝賻贈亡師惠堅物表一首沙門常清等言伏奉中使美庭瓌宣聖慰贈亡僧惠堅絹二十匹跪捧慚惶悲懼交集沙門常清等誠惶誠恐常清等並受業惠堅積有年歲道不精苦上延光師伏蒙聖慈眷念殊贈曲臨末品微僧不勝悲幸謹奉表陳謝以聞沙門常清等誠惶誠恐謹言大曆七年六月十二日內道場故念誦僧惠堅弟子常清等上表登刀梯歌序頌謝表等三首大唐大曆三年戊申之歲十月二十八日奉敕於章敬寺建道場時有江東沙門崇惠登刀梯升劍樹涉油炭鑊坐錐劍床是日也百宮星馳萬人雲集莫不驚魂歎未曾有釗稽首翹足而為歌曰百尺淩空倚劍梯千峯回拔接天霓鏖爐霜明鳥道齋龍泉金鐶生虹霓刀為樹劍作山應真飛錫遊其間一步一登揮手攀毛七星璨爛光斑斑干將劍刃兩離披碧光焰上人履之不為嶮鏌耶刀銛鋒鋭鍔可吹毛如今蹈之不足勞白若雪青如氷龜甲魚鱗幾百層四部覩之戰戰兢兢萬仞峯頭見一僧賓鐵文青蛇色蒨𮑕崢嶸寒岌嶷不傷不損難可測方是大悲解脫力自古武臣矜劍術舞之殳之皆不失視之膽攝身栗栗誰道揮戈移白日李廣舊傳百戰功何如今日見神通紫衣襜襜飛入空出沒縱橫白刃兮光翡翠黯黯精光和能利崇惠登刀梯頌并序自漢明感夢騰蘭裂見網於雒陽秦主懷疑羅什顯寶鏡於瓶內傅奕辭誚著辨正之文琳崇惠催邪顯神用於章敬其事相也玄聳木百尺上有二層寶刃交羅金鈴四繞炎爐八甬池飾蓮荷銛座毒鋒並布欄楯之內是日也天瑩增明風塵不起凝霜聚散日氣和喧于時敕賜法衣親使監覩國師宰輔文武雄班鄰國弼諧龍象法侶黃冠朱麾衆類同赴法筵士庶盈衢側足瞻顧佛聲震發聞于十方衆寶爐煙如雲如蓋於是手摧劍樹腳碎刀林猛焰煙然於中來往池敷坐具似涌蓮蓮開衆毒攢鋒遍行收食僧儀不墜澡嗽散之大衆咸欽歎未曾有僕親觀盛事喜不自勝同沐慈雲賴霑美澤火炬高舉破暗瞑山開豁濁流歸乎法海頌曰大哉正覺神力難思夢感明帝騰蘭降輝群邪捨執稽首歸依秦殿鏡寶瓶顯降疑傅奕辭誚辨正摧之沙門崇惠止毀排非水火刃毒對驗希奇善哉一期之盛事將來千載而不移謝賜紫衣並賀表一首沙門崇惠言昨奉觀軍容使宣進止令於章敬寺登劍樹渡火坑伏奉中使鞏庭玉宣進止賜紫僧衣一副者崇惠聞有願不孤觀音之慈速克念斯應能仁之力雄所以入火不焚以期必效履刀不割方奏明徵不謂大聖加威天恩曲被遂使觀身法界蒙熾焰而無傷舉足道場凌霜刃而不沮實冀妖氛永息業海長清況道俗同歡人天畢覩此則陛下至誠之所感也豈微僧一志之所為乎叨沐殊私無任慶悅謹奉表陳謝以聞沙門崇惠誠惶誠悚謹言大曆三年十月二十九日安國寺沙門崇惠上表寶應元聖文武皇帝答曰師精勤梵行夙契真乘誠之感通佛所護念委身烈火之上投足銛鋒之端坦然經行如在床席都城縱觀四部歸依所施非優煩勞稱謝恩命拂拭京城諸寺塔像訖進表一首并答沙門惠果言伏奉去年十二月十九日中使李憲誠奉宣敕旨令微僧巡京城諸寺句當灑掃殿宇拂拭尊像及勒僧尼徒衆焚香念誦為國發願虔祈福祐者謹以去十二月二十日於莊嚴寺佛牙處起首至今月八日終興善寺等一百一十二寺應有殿塔佛牙經藏靈迹舍利處總九百五十七所奉宣睿誠發揮像教拂石塵劫降天衣於六銖滌埃金身耀千葉於蓮座舊容復照古書再鮮香焚殿中躍灑庭內承清淨以發願若靈應而感通今四海澄波三天卷霧虜塵不起旭日破昏微僧又謹案雜寶藏等經云若掃一閻浮提地不如掃佛塔一手掌許常作轉輪聖王此皆階下聖慮精微信心弘著潔其淨土廓彼空門大庇釋徒延于萬國福若雲集應如響臻故得災沴不生氛祲自滅叶于宸念如此之速微僧因故師資特蒙聖將借恩廄馬監寵中宮榮命自天矜惶失措涓埃靡效霈澤寧任不勝虔懇之至謹附中使元應金奉表以聞誠惶誠恐謹言大曆十二年正月八日大興善寺檢校兩道場兼知院事沙門惠果表進寶應元聖文武皇帝批闍梨妙行堅持頗聞修潔所以命遍巡淨界用廣勝因金剎載清玉毫呈照虔誠所至深可嘉焉所奏知進興善寺文殊閣內外功德數表一首并答大興善寺文殊鎮國閣中奉敕素畫文殊六字菩薩一鋪九身閣內外壁上畫文殊大會聖族善薩一百四身今並成就沙門惠勝言伏惟寶應元聖文武皇帝陛下弘文殊事行普賢願益為群品樹此勝因表果德真儀示色身實相今七災消沴萬福莊嚴不遇聖慈何由瞻覩丹戶晨燭如觀日宮玉毫夜光猶開月殿隨喜者荷帝王之力歸趣者發菩提之心使塵沙有情普承佛惠而緇門釋子偏沐天波豈只轉念誦持而能奉報者矣但冀憑文殊法力上答洪恩其所畫素大聖福田謹因降誕吉辰謹奉中使李憲誠具表陳進以聞沙門惠勝誠惶誠悚謹言大曆十二年十月八日檢校兩道場知院事沙門惠勝上表寶應元聖文武皇帝批師夙勤梵行戒律精嚴久在道場宗建切德勞彰歲月福聚家邦無量勝因歎慰斯在也恩賜錦綵縑緗共四十匹謝表一首并答沙門惠勝言伏奉中使李憲誠宣聖旨特賜錦綵縑緗共四十匹捧跪慚荷歡懼無任伏惟寶應元聖文武皇帝陛下諸佛願身普賢密行為弘大化屈已人尊在於微僧偏霑殊澤然普賢之法本是先師所傳之典復為陛下所付之道微僧遠感先師遺訓仰慚聖主深恩習效古人獻芹之事有茲涓滴上達聖情不意天恩寵賜過甚便以所賜啓獻先師遺身影塔為國念誦諸會道場發願懇誠冀憑佛力永保皇家不勝戴荷之至謹附中使李憲誠奉表陳謝以聞沙門惠勝誠歡誠賀謹言大曆十三年六月六日大興善寺檢校兩道場知院事沙門惠勝表上寶應元聖文武皇帝批諸佛祕藏先師受持傳布人天誠為法要薄申獎賚以助修行也所謝知肅宗恩命三藏弟子惠䏏入內道場念誦制一首奉敕語有銀臺門家喚不空三藏弟子惠䏏瞿那惠曉惠月等四人入內將飛龍馬取與三藏建飾道場念誦至德二載十二月二十六日品官晏如障宣恩旨命三藏弟子僧惠曉為國念誦制一首奉敕語不空三藏弟子僧惠曉等比在賊中為朕剋念精誠潛修功德今剋復天下皆佛力之應也自今以後須倍加精勤為朕念誦莫以度取即不精勤至德三載正月十八日將軍假喬福宣代宗恩旨命西明寺給粥飯往來騎乘制一首奉敕語西明寺僧惠曉為朕修功德在寺依恆二時粥飯及出入往來畜乘一切供給勿令闕少大曆六年八月二十五日高品馬奉誠宣往五臺山修功德辭謝聖恩表一首并答沙門惠曉言今月十日面奉進止令往五臺山撿挍大聖金閣寺尊像顏色契印至九月停作却赴闕庭令修陛下降誕日功德者惠曉爰自二十年辭家慕道承順大廣智三藏和尚顏色三十餘年五部真言親被指授不離左右得對天顏每於含暉延英長生等殿常修功德所恨不能精懇殘孽未平聖慈曲臨又令遠使更賜束帛三十匹驛騎公糧山門借乘微僧何幸天澤纍霑誠喜誠歡不勝戴荷即以今日發行可謂戴馳騕裊望金閣而非遙春往秋還謁紫震而何遠無任戀恩悚懼之至謹附監使品官魏明秀奉表陳謝以聞沙門惠曉誠惶誠恐謹言大曆十二年三月十九日五臺山修功德使西明寺沙門惠曉上表寶應元聖文武皇帝批師依止釋門弘敷聖教言尋有相將赴靈山錫賚非多煩於申謝也恩命令與惠朗同修功德謝表一首并答沙門惠曉言去三月十一日面奉進止令五臺山修功德者至七月十九日齋後與中使李童枝等七十餘人將香火巡禮所將之火不得至臺懇責於心憑何啓請至山頂童子辨戈忽於石上見濕灰燼便得微火伏惟陛下九重遠被聖火生於濕灰焚香𮟅祈菩薩萬形出現光輝燦爛相好分明凝然滿空詣夕靡散又與監使魏明秀等同至此臺為國祈禱發願之次攝身光圓光菩薩等相次二十七度現表陛下聖感潛運菩薩屢彰崇敬五臺靈瑞非一微僧何幸覩斯聖迹不勝感慶之至今月十日蒙天恩令每與惠朗同修功德殊私曲照再入金門寶殿修持無任戰悚謹附中使李憲誠奉表陳謝以聞沙門惠曉誠歡誠喜謹言大曆十三年十一月十七日五臺山修功德使西明寺沙門惠曉上表寶應元聖文武皇帝批師服勤梵行久在清涼業廣戒圓志精功備偕申齋潔崇福家邦也所謝知元日獻甄叔迦寶表一首并答沙門惠曉言伏奉恩旨令臺山撿挍修功德為國祈福至南臺南有山先曾梵僧巡禮之次言此山有甄叔迦寶若貪心上者皆遇風雷惠曉焚香邀祈登此山上有小石窟方數尺有水其色如朱於中獲寶凡三十片其色如珀者惠曉聞明王有感地不藏珍伏惟陛下覆載若天地照明如日月況聳金閣於峯下搆玉華於巖巘微僧銜命陟彼名山焚香啓誠電雨不作遂獲茲寶又準般泥洹經云腳躡臺山一顆石却後七劫不墮惡趣況是希代之異寶今萬物惟新之日九重納祐之期謹附中使李憲誠隨表奉進以聞沙門惠曉誠惶誠躍謹言大曆十三年正月一日五臺山修功德使西明寺沙門惠曉進寶應元聖文武皇帝批師訪道靈山精修正覺異石來獻用表勤誠所進知八月十三日賜手詔一首時在臺山金閣寺敕惠曉闍梨令遣中使揚善德往彼句當功德師服勤禪誦資慶家邦也秋涼師比平安好遣書指不多及十三日進五臺山修護摩功德表一首并答沙門惠曉言今年四月十日中使魏明秀奉宣進止令微僧就五臺山大聖金閣保應鎮國寺修護摩功德者惠曉虔愚誠精達聖意修上件功德陳文殊宿願啓先師冥力依俙有憑響像來應遂得火色鮮潤煙氣不起異於他日實表清晴是華夏晏謐之徵兵塵止息之驗此皆陛下至道潛運上天合德使百靈效福萬姓歡心妖災永除休慶日集惠曉忝廁緇列恭承明教懼辱聖旨幸福嘉祥無任抃賀之至謹附中使魏明秀奉表以聞沙門惠曉誠歡誠喜謹言大曆十三年十二月十八日西明寺沙門惠曉上表寶應元聖文武皇帝批文殊大聖保護靈山師虔誠之心神貺昭感至誠必應深可嘉之所賀知敕大興善寺都維那法高依前句當制一首并使牒奉敕語李元琮興善寺都維那法高宜令即依前句當都維那事大曆十年四月十七日高品李憲誠宣敕句當京城諸寺觀修功德使牒興善寺都維那法高牒得舉稱奉敕如右未有各牒所由施行處分者録敕牒僧法高者故牒大曆十年四月十七日牒使開府儀同三司兼右龍武軍持李琮謝恩命令有則法師於興善寺開講表一首并答沙門法高等言伏奉今月四日敕令章敬寺有則法師於當寺講金光明經雨露在顏絲綸溢自佛事時敘法音式宣涓塵何階局蹐無地伏惟寶應元聖文武皇帝陛下仁化御宇密行持法眷言東流是用南顧且寺有隨所建近二百年雖名僧住持代則不乏而恩命宣唱時所未聞今者詔自天落人從地踊經雖仍舊疏實惟新命僧尼而駿奔求士女而麕至皆諸佛妙力斯經勝緣暢陛下外護之心成僧等難遭之幸必冀上資聖曆申振國容致年穀於升平納含生於壽域不勝蹈舞之至謹奉表陳謝以聞沙門法高等誠歡誠喜謹言大曆十三年四月十九日大興善寺都維那沙門法高等上表寶應元聖文武皇帝批法師有則妙行精修開方便門演大法義敷揚聖教以廣勝因副勳賢之忠誠闡幽微之奧旨俾含生之類俱霑景福也所謝知謝制補沙門惠朗充興善寺上座表一首并答沙門法高等言伏奉今月十四日敕補大德惠朗為大寺上座天光所照威崇在顏桑門有人像法將久法高等聞人之所願天必從之道如或存王實有力伏惟寶應元聖文武皇帝陛下金輪撫運玉燭乘時弘外護於聖心降無緣之慈澤人從中禁留念誦而未妨寺邇天街借住持而無替不勝慶躍之至謹附內功德使李憲誠奉表陳謝以聞沙門法高等誠歡誠喜謹言大曆十三年四月十五日大興善寺都維那沙門法高等表上寶應元聖文武皇帝批師等精潔梵園服膺禪誦支提所聚須擇紀綱惠朗恭勤允副公選總領寺務斯謂得人也所謝知三藏和尚當院碑一首唐大興善寺大辨正廣智三藏國師之碑題額唐大興善寺故大德大辨正廣智三藏和尚碑銘并序銀青光祿大夫御史大夫上柱國馮翊縣開國公嚴郢撰銀青光祿大夫彭王傳上柱國會稽郡開國公徐活書和上諱不空西域人也氏族不聞於中夏故不書玄宗燭知至道特見高仰訖肅宗代宗三朝皆為灌頂國師以玄言德祥開佑至尊代宗初以特進大鴻臚褒表之及示疾不起又就臥內加開府儀同三司肅國公皆牢讓不允特賜法號曰大廣智三藏大曆九年夏六月癸未滅度於京師大興善寺代宗為之廢朝三日贈司空追諡大辨正廣智三藏和尚荼毗之時詔遣中謁者齋祝父祖祭申如在之敬睿詞深切嘉薦令芳禮冠群倫譽無與比伊年九月詔以舍利起塔於舊居寺院和尚性聰朗博貫前佛萬法要指緇門獨立邈蕩蕩其無雙稽夫真言字義之憲度灌頂升壇之軌迹則時成佛之速應聲儲祉之妙天麗且彌地普而深固非末學所能詳也敢以概見序其大歸昔金剛薩埵親於毗盧遮那佛前受瑜伽最上乘義後數百歲傳於龍猛菩薩龍猛又數百歲傳於龍智阿闍梨龍智傳金剛智阿闍梨金剛智東來傳於和尚和尚又西遊天竺師子等國詣龍智阿闍梨揚攉十八會法法化相承自毗盧遮那如來逮於和尚凡六葉矣每齋戒留中道迎善氣登禮皆答福應較然溫樹不言莫可記已西域隘巷狂象奔突以慈眼視之不旋踵而象伏不起南海半渡天吳鼓駭以定力對之未移晷而海靜無浪其生也母氏有毫光照燭之瑞其歿也精舍有池水渴涸之異凡僧夏五十享年七十自成童至于晚暮常飾供具坐道場浴蘭焚香入佛知見五十餘年晨夜寒暑未曾須臾有傾搖懈倦之色過人絶遠乃如是者後學升堂誦説有法者非一而沙門惠朗受次補之記得傳燈之旨繼明佛日紹六為七至矣哉於戲法子永壞梁木將記本行託余勒崇昔承微言今見几杖光容眇漠壇宇清愴纂書照銘小子何讓銘曰嗚呼大士有我三宗道為帝師秩為儀同昔在廣成軒后順風歲逾三千復有肅公瑜伽上乘真語密契六葉授受傳燈相繼述者牒之爛然有弟陸伏狂象水息天吳慈心制暴慧力降愚寂然感通其可測乎兩楹夢奠雙樹變色司空寵終辨正旌德天使祖祭宸衷悽惻詔起寶塔舊庭之隅下藏舍利上飾浮屠迹殊生滅法離有無刻石為偈傳之大都建中二年歲次辛酉十一月乙卯朔十五日己巳建此碑文一首以唐本編年通論中之文德治二年丁未五月三日於神護寺成身院以濟暹僧都所持之本書寫了猷然七十四一交了點本云以勸修寺大經藏御本點挍了云云
