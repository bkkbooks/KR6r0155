body:
  text: 上都長安西明寺沙門釋圓照集凡二十九首答制十六首總四十五首召念誦僧制一首敕慧敕教授後學制一首敕慧勝依所請住制一首停修舊塔地制一首敕於當院起靈塔制一首并使牒沙門慧朗謝賜紫衣表一首并答恩賜文殊閣額制書一首謝賜額表一首并答進造大聖文殊鎮國閣狀一首謝恩賜小祥齊供表一首并答弟子慧果謝賜錦綵表一首并答敕天下僧尼誦尊勝相真言制一首謝誦持尊勝真言表一首并答請為先師立碑表一首賀平李靈曜表一首并答故功德使李公挽歌詞二首請續置功德使表一首謝賜齊襯茶表一首賀春雪表一首并答賀度韓王女出家表一首青龍寺僧曇貞賀祈雨賜物表一首并答沙門飛錫賀晴表一首并答覺超賀湫所祈雨表一首并答請辭內道場陳情表一首并答賀祈雨表一首并答賀破咄蕃表一首并答僧惠超賀玉女潭祈雨表一首并答僧曇貞賀祈雨表一首并答靈應臺僧道潤賀平河南表一首監使憲誠進怖鴿毛表一首并答召念誦僧制一首奉敕語元琮化度保壽興善等寺先於故三藏和尚邊受法僧有功業者即具名奏來大曆九年七月七日內謁者監李憲誠宣敕慧朗教授後學制一首奉敕語僧慧朗專知撿校院事兼及教授後學一尊一契有次第者聞奏大曆九年七月七日中使李憲誠宣敕惠勝依請制一首奉敕語僧惠勝和上在日阿師子偏得意旨今聞於塔所焚香火守護先於和上邊受得普賢念誦法與朕同尊努力精修三年滿後即來對朕與商量本尊法所請依住大曆九年七月七日中使高品李憲誠宣停修舊塔地制一首奉敕語元琮故大辨正廣智不空三藏和上塔所修造宜令且停別擇好地起修大曆九年七月十五日中使李憲誠宣敕於當院起靈塔制一首并使牒奉敕語元琮故辨正三藏荼毗得舍利令當寺院造舍利塔大曆九年八月二十八日內謁者監李憲誠宣敕句當京城諸寺觀修功德使牒興善寺牒得舉稱奉敕如右未有各牒所由請施行處分者録敕牒興善寺仍牒故三藏和上院者故牒大曆九年九月八日牒判官前資州司馬劉浩使開府儀同三司兼右龍武軍將軍李琮沙門惠朗謝賜紫衣表一首并答沙門惠朗言惠朗至微瑜伽一介叨承聖澤濫沐殊私出入金門薰修別殿幸奉明詔頻對九重紫綬袈裟特蒙恩賜不但榮飾先師實亦光耀後學微僧無任悲感謹奉表陳謝以聞不勝戰灼之至誠歡誠喜謹言大曆九年十一月二十九日大興善寺故大辨正三藏和上付法弟子僧慧朗表進寶應元聖文武皇帝答曰師夙勤梵行先踐法流福惠所資生靈蒙賴爰賜命服煩此謝恩恩賜文殊閣額制一首奉敕八分金書大聖文殊鎮國之閣額一宜送大興善寺翻經院大曆十年二月十三日中使李憲誠宣謝賜額表一首沙門惠朗言今日伏奉中使李憲誠宣聖旨特賜八分金書大聖文殊閣額一御札神蹤筆勢奇絶名雄鎮國字燭天文鵲顧鸞回宛然飛動龍姿武態逈拔風雲陷垂露於九霄戚墜石於千仞金光炳煥共日月俱懸聖跡楷模與乾坤不朽候迎瞻仰眼目清新審慮諦觀心神爽晤微僧何幸沐此恩波戴荷高天愧慚無地不勝抃躍歡悚之至謹奉表陳謝以聞沙門惠朗誠欣誠荷謹言大曆十年二月十三日大興善寺沙門惠朗上表寶應元聖文武皇帝答曰伽藍別院安置真容金榜發揮式光大聖師勤修香火保護邦家所謝知進造文殊閣狀一首大興善寺翻經院造大聖文殊師利菩薩閣都計入錢二萬二千四百八十七貫九百五十文內出代絹共計入一萬三千五十二貫文一萬一千一百五十二貫文准絹四千一百一十七匹抑充二千貫文見錢入一千八十貫五百三文和上衣錢諸雜錢物入八千三百五十五貫四百四十七文外施及諸雜并賣物入應造大聖文殊師利菩薩閣破用及見在數如後四千五百四十二貫五百四十五文買方木六百一十根半九百七十四千八百一十文買椽柱槐木共八百四根一千四百九十一貫一百七十文買磚瓦鵄獸五萬五千六百九十八口二百一十四千五百文買棧七百束等用七百四十六千二百二十五文買柏木造門窗鉤欄等用七百六十四千文買石矴諸雜石并雇車腳手功糧食等用一百一十六千四百二十五文買麻檮等用三百三十九千五百九十一文買釘鐵等用八十千文造閣上下兩層風箏八枚等用八十五千二百八十八文買石灰赤土黑蠟等用二千四百七十八貫九百四十六文造金銅釘門獸諸雜鉸具用六百九十四千五百五十文雇人築階并脫塹等用二千二百八十八貫三百文雇人揚仙立木手功糧食等用八百貫文買彩色解緣畫羅文軟作手功糧食等用一千五十一貫二百九十六文雇人解木手功糧食用三百五千文雇人瓦舍及手功糧食等用一千五百一十八貫九百文造怙柏門窗鉤欄障日手功糧食等用三百三十貫文泥壘作手功糧食等用二百五十七貫文雇人畫嵈基隔窠并買彩色手功糧食等用五百九十五千六百八十七文雇人車船載方木腳錢等用三百五十七千七百文雇人砌壘磚作手功糧食等用一百六十二貫五百四十八文買趙越籧篨席箔炭花藥鑺紙筆油等用一百貫九百八十二文僧使行者外使催趁糧食設功匠等用五十二貫五百一十文買膠及麻打繩索諸雜等用三百一十二千七百九十文雇雜使年月日功人等用八百七十三貫二百五十文買車四乘牛六頭等用六百八十二貫八十七文與牛買草豆𮭽牛藥逐車人餅錢等用右具破用數如前應買入雜施入回殘見在如後合入方木六百八十五根半七十五根外施入六百一十根半買入四百八十七根半造閣用訖一百二十七根出賣訖七十一根見在合入搏柱二百四十四根一百四十八根外施入九十六根買入一百七十三根造閣用訖七十一根見在合入椽二千四百一十四根一千五百七十根外施入八百四十四根買入一千八百五十四根造閣用訖五百六十根見在合買入棧七百束三百五十束造閣用訖三百五十束見在合入膠六百八十三斤六百斤敕賜入四十斤外施入四十三斤買入造閣用訖合入蠟六百二十斤六百斤敕入二十斤買入並造閣用盡右具通造閣所入錢物方木等及諸雜用外見在數如前謹録奏聞伏聽聖旨大曆十年四月五日檢校造閣僧秀嚴等狀進同檢校造閣僧惠勝敕檢校院事僧惠朗謝恩賜小祥齊供表一首并答中使段物華至奉宣聖旨以故大辨正廣智三藏和尚周年入塔齊賜一千人供兼賜茶二百串度弟子二人伏以先師寂滅星歲俄周聖思飾終纍有榮施賜錢起塔錫饌度僧雨露浹於幽明光寵被於存沒凡在法侶悲愧交馳中使荐臨香茶繼至送全身於多寶荷殊澤於九霄無任感戴之至謹奉表陳謝以聞不勝戰灼之至誠歡誠喜謹言大曆十年六月十五日大興善寺沙門惠朗表進寶應元聖文武皇帝答曰先和上寂滅歸常驟移星序益多傷悼追崇福祐齊施所資顧非厚給煩此申謝也恩賜錦綵謝表一首并答沙門惠果言伏奉今月九日中使李憲誠奉宣進止賜微僧錦綵共二十匹捧對欣懼如山壓己惠果幸逢休明叨承聖澤聚沙之歲則事先師二十餘年執持巾錫瑜伽祕密之宗普賢深妙之要特蒙教誨偏承意旨切令為國晝夜修行微僧是以破膽竭肝亡形殉命斯須不間祈誓懇誠將酬雨露之恩冀答殊私之造無任抃躍之至謹附表陳謝以聞沙門惠果誠歡誠恐謹言大曆十年十一月十日大興善寺沙門惠果表進寶應元聖文武皇帝批和上遺教闍梨克遵祕密之宗流傳弟子覽師精懇表以勤勞薄錫縑緗以崇香火也所謝知敕天下僧尼誦尊勝真言制一首奉敕語李元琮天下僧尼令誦佛頂尊勝陀羅尼限一月日誦令精熟仍仰每日誦二十一遍每年至正月一日遣賀正使具所誦遍數進來大曆十一年二月八日內謁者監李憲誠宣謝誦持尊勝真言表一首并答沙門惠朗言伏奉恩敕令天下僧尼誦持佛頂尊勝真言者諸佛之心目蒼生之津梁陛下受佛付囑申以法化惠朗跡在緇門又叨近侍愚誠之分實驚實喜伏惟陛下謀協聖慈陰贊生利致仁壽之域在茲一言播無彊之休以靖萬國山川鬼神亦莫不寧鳥獸魚鱉允將獲祐僧有獎進之路俗成同善之風此則陛下超天下之恩參承至道為用豈愚僧日用而知者哉生植之澤以云深厚誨誘之德上答何階謹附中使元應金奉表陳謝以聞誠歡誠喜謹言大曆十一年二月二十三日興善寺沙門惠朗等表進寶應元聖文武皇帝批佛頂真言神力廣被庶資弘益普及含靈比令誦持有勞表謝也請為先師立碑表一首沙門惠朗等言先師大辨正不空三藏和尚早逢聖代紹佛傳燈浮海梯山詢求法寶獲金剛密印了三昧總持舍利苞於色身智鏡懸於心月坦夷大道輔翼皇家自天寶已來皇祖皇考降尊問法禮具師資陛下臨朝又加殊敬其道德寵錫超倫存稱灌頂之師沒贈上公之位一從遷化再歷歲時影塔空建於雙林盛德未題於貞石聖慈哀眷許製豐碑瞻仰天文冀其降止微僧夙願待此將終伏乞鴻恩俯垂矜允不勝懇欵之至謹奉表陳請以聞輕冒龍顏無任戰懼沙門惠朗等誠惶誠恐謹言大曆十一年四月五日大興善寺沙門惠朗等上表賀平李靈曜表一首沙門惠朗等言惠朗聞逆德者亡已孽難逭伏惟陛下聖明獨斷密運神謀用將士威武竭誠討叛寇梟擒捷八州既獲得海外開通萬國來朝四夷納貢惠朗等不勝慶快之至謹附中使李憲誠奉表陳賀以聞沙門惠朗等誠歡誠喜謹言大曆十一年十一月二十八日大興善寺沙門惠朗等上表寶應元聖文武皇帝答曰靈曜狂叛違拒朝經軍師四臨寇㜸霄潰凶首擒執汴垂再康所賀知故功德使涼國公李將軍挽歌詞二首前左領軍衛兵曹參軍翰林待詔趙遷業盛唐堯際功成文子軍纍承三帝寵六比五臣勳畫角悲寒吹愁笳咽曉雲聖朝忠義骨今日委荒墳大樹悲風起將軍去不回撫棺心益痛臨穴淚難裁曉月繁霜草幽泉掩夜臺更聞歌伴哭觸物盡成哀請續置功德使表一首沙門惠朗言惠朗聞惟人植福惟福利人苟闕其司善無由長伏惟寶應元聖文武皇帝陛下所登天祚蓋為蒼生隔截邪途護持正法萬邦咸幸豈惟京城自國家特置功德使已來衆福日滋群凶時滅皇室起崇高之祐緇門絶挫辱之虞惟天所知人罕悟矣一昨元琮薨沒帝京僧侶相視黯然舉目增悲中言下淚又懼惡魔獲適心之便外道得攘臂之秋正教陵遲邪林茂盛伏乞聖慈擇一賢臣職司功德永國家惟新之福解僧人懷舊之悲謹附監使李憲誠奉表陳謝以聞不勝戰灼之至沙門惠朗誠惶誠恐謹言大曆十一年十二月日大興善寺沙門惠朗上表謝齊襯茶表一首沙門惠朗言伏奉今月十四日設一千僧齊賜茶二百串今日又蒙中使宣示恩命慰及門人周行天香薰馥存沒惠朗等誠悲誠懼心魂殞越承先師之遺蔭沐陛下之殊澤儻神理有在冥感聖恩則結草之報必由香茶矣無任負山海之至謹附中使李憲誠奉表陳謝以聞沙門惠朗誠惶誠恐謹言大曆十二年六月十日沙門惠朗等上表賀春雪表一首沙門惠朗等言比屬去冬愆陽聖心憂軫廣崇勝福蓋為生靈果得春雲灑空皓雪呈端普天含潤澤被無涯昏塵自清豐年有待惠朗等五十三僧每在道場為國持念自正初已來互相策勵或有七日不食或有經旬忘寢貴資片善上答殊私沐澤堯年仍慚野老無任欣悅之至謹附中使李憲誠奉表陳賀以聞沙門惠朗等誠歡誠喜謹言大曆十三年正月十七日大興善寺沙門惠朗等上表寶應元聖文武皇帝答曰頃以時當發生自冬無雪朕情深望歲軫慮愆陽師祈禱精誠膏澤普霑至誠所感當用慰焉所賀知賀度韓王女出家表一首京城釋門衆大興善寺上座沙門惠朗等言伏奉今月六日聖旨度韓國大王長女鴻恩放天孫出家祐資皇后踵繼愛道寵光釋氏伏惟陛下至聖之心利物弘廣雖乾坤之大疇能況焉去蟬鬢之鳳敘剃除雲髮脫寶衣之瓔珞被服袈裟三界人天皆霑福澤天下緇門不勝戴賀謹附中使魏行琳奉表以聞沙門惠朗等誠歡誠喜謹言大曆十三年十月九日京城釋門大興善寺上座沙門惠朗等上表沙門曇貞賀南山祈雨賜物表一首并答沙門曇貞言比頃以膏雨未敷聖心憂軫特奉進止令往南山祈雨肝膽斯竭望赴天心於法無功龍神不應空勞睿想虛費供須既無喜期誠當罪責聖慈寬宥錫賚殊深蒙錦綵七十匹戴天履地莫知高厚豈謂憂憤之門忽逢聖咸霈然之澤無任歡抃愧懼之至謹附中使李憲誠奉表陳謝以聞沙門曇貞誠惶誠喜謹言大曆十二年八月三日青龍寺沙門曇貞上表寶應元聖文武皇帝答曰師久勤梵行夙著精誠虔潔道場至祈膏澤薄申獎賚煩此謝章也賀晴表一首并答沙門飛錫等言伏奉八月二十六日中使高品李憲誠宣聖旨令京城諸寺釋門衆轉大般若孔雀王等經精勤止雨用副聖心者飛錫聞帝堯至聖不無水雨之多大雲寶經亦有請止之化頃者稍如霖霪納慮於隍陛下親露心於金人每焚香於玉殿遂使晴光上升折重雲而四照惠風旁振掃氛霧於八方粢盛可期倉庾恆溢斯皆天慈精詣僧等何知凡在道俗無任感戴謹附中使李憲誠奉表陳賀以聞沙門飛錫等誠歡誠躍謹言大曆十二年九月一日京城釋門衆沙門飛錫上表寶應元聖文武皇帝答曰師緇門領袖久在道場勤結梵緣福資黔庶真聖所祐宿陰漸開宜益虔誠慶流家國也所賀知賀湫所祈雨表一首沙門覺超惠照等言今月十五日中使楊貴玢至奉宣聖旨令覺超等於南山湫所七日祈雨者陛下恭己育物慮甘澤於夫時以人為心閔農殖於望歲遂使有靈必禱神跡克祈而萬姓荷慈愛之恩群生欣父母之義比者雨雖罕降百草皆滋旱不及憂五穀咸茂此即陛下順天之道潛運體元之化內諧覺超等猶愚不任慶美之甚人皆含識豈勝歡戴之極覺超伏奉聖旨便結道場晝夜精誠以副文思之旨莫敢懈怠用彰光宅之令持誦初經一宿雲霧忽洽於山川啓請未盡兩辰霈澤遽灑於城闕是知堯年之感玄應在乎須臾舜日之謀休徵無復遲久所樹苗稼忽若增膏凡謂糧儲實將逾賤覺超與鄉村父老等以戴以躍不覺手舞于閭閻乃沷乃止自然足蹈於衢巷無任抃踊之至謹奉表陳賀以聞沙門覺超惠照等誠歡歡喜謹言大曆七年六月二十日保壽寺沙門覺超惠然等上表寶應元聖文武皇帝答曰師等經行宴坐久晤無生念深家邦誠請膏澤聖真垂祐零雨應期傳洽秋原戴榮嘉穀西成有望用愧勤勞所賀知也請辭內道場陳情表一首長生殿道場念誦沙門覺超惠海等言覺超惠海等素無德業濫目緇流隨侍先師入出中禁食分御膳服減天衣厩馬公車往來乘駕因循歲月十五餘年錫賚殊私丘山已積論功報國纖芥曾無撫已修涯豈堪愧恧且出家之人受佛教令精修功德令處伽藍久在天宮實貽物議夙夜思忖何情自安特乞聖慈降垂矜放各歸本寺為國修行福田所資寧限中外不勝虔懇之至謹附中使李憲誠奉表陳請以聞沙門覺超惠海等誠惶誠懼謹言大曆十二年五月二十二日念誦沙門覺超惠海等上表寶應元聖文武皇帝答曰師等妙行精修堅持正覺留在中禁用廣勝因無去無來何至辭讓也賀祈雨表一首并答沙門覺超等言伏奉八月二十七日中使魏行林宣聖旨霖雨久滯即令止雨者覺超等忽奉綸言倍加虔懇啓告龍神晝夜精誠肝膽斯竭承陛下天威雲收雨止秋稼皆資茂實伏惟皇帝聖德動天子育萬類率土歡心百僚咸慶道場僧等不勝欣躍之至謹附中使樂令欽奉表陳賀以聞沙門覺超等誠歡誠喜謹言大曆十二年九月一日長生殿道場沙門覺超等上表寶應元聖文武皇帝答曰師緇門領袖久在道場勤結梵緣福資黔庶真聖所祐宿陰漸開宜益虔誠慶流家國也所賀知賀破吐蕃表一首并答沙門覺超等言伏見露布子儀下將士破吐蕃擒生數千斬首盈萬者伏聞以順罰逆興師必功以義制淫舉無不剋日者蕃醜負約敢背國恩從兵邊陲憑淩石地伏惟陛下聖略通神天威遠震勢同破竹如火燎原俘擒魁渠僵尸滿野覺超等忝在釋門喜清國步無任慶躍之至謹奉表陳賀以聞沙門覺超等誠歡誠喜謹言大曆十二年八月二十八日內道場保壽寺沙門覺超等上表寶應元聖文武皇帝答曰西蕃負恩元戎致計天道助順殲厥凶渠師等釋流亦當為慰也所賀知賀玉女潭祈雨表一首并答沙門惠超言伏奉前月二十六日中使李獻誠奉宣口敕令惠超往盩厔縣玉女潭修香火祈雨惠超行闕精修謬揚天旨山川靈應不昧禱祈初建壇場溪聲乍吼及投舍利雨足如絲一夕而草樹增華信宿而川原流潦澤深枯涸慶洽人神伏惟陛下聖德動天天澤先降豈惠超微物精誠感通無任喜慶抃躍之至謹因中使李憲誠入奏奉表陳賀以聞沙門惠超誠惶誠恐謹言大曆九年二月五日內道場沙門惠超上表寶應元聖文武皇帝答曰朕勤恤黎元望深時雨分命鄉里遍禱靈祠而和澤荐霑甫及旬晦師久勞虔潔勤清道場有年可期顧增歡慶也所賀知同前文一首沙門曇貞等言伏奉前月二十九日中使李憲誠至奉宣聖旨命曇貞等於寺前玉女潭下轉念助修祈雨伏惟陛下以冬無積雪春又亢陽憂濟元元精誠遠禱中使等初修香火天無纖埃既宣聖旨恍然靈變山風結結若殷其雷潭水沈沈或分龍躍遂使霈然豐澤遍灑川原壬膏由是脈起草木因之甲拆蒼生欣戴日用難述曇貞等學道明時僻居巖谷幸霑聖澤抃躍空增無任喜慶之至謹因中使李憲誠奉表陳賀以聞沙門曇貞等誠惶誠恐謹言大曆九年二月三日盩厔縣仙遊寺僧曇貞上表寶應元聖文武皇帝答制同前靈應臺道潤賀平河南表一首靈應臺檢校觀音道場念誦沙門道潤等言伏承河南諸將收獲汴州大破田恍生擒靈曜梟鏡之徒浹辰瓦解蜂蠆之毒氷消天地人神無不慶嘉伏惟寶應元聖文武皇帝陛下據法王之正教行觀音之大悲子惠蒼生恐一物失所而彼狂豎故拒違天實非天誅是自取禍今者河清海晏日潤山晴尚聞天師猶賈餘勇虜戮承嗣固在不遙微僧此時慶幸何甚仰承皇澤江海非深不勝欣悅之至謹附中使李憲誠奉表陳賀以聞沙門道潤誠賀誠欣謹言大曆十一年七月二十九日靈應臺檢校道場沙門道潤上表進怖鴿毛表一首臣憲誠言誠惶誠恐死罪死罪伏惟陛下孝理天下嶽瀆所以降祥信及昆蟲鱗羽所以呈瑞今釋經具載怖鴿避鷹至身子影戰栗未除至如來影怖畏都盡其人與骨皆已朽矣唯鴿餘毳今尚存焉其體也輕其色也紺入火不化遇風輒飛臣憲誠久事軒墀親自觀試焚毛不燼者知佛教之未衰自周傳唐者表皇劫之更遠犬馬之志比以獻芹烏鳥之情方諸奉愧事雖至小不敢不進臣憲誠誠惶誠恐死罪死罪謹言大曆十二年正月一日元從朝散大夫行內侍者內謁侍者監同正員上柱國賜魚袋臣李憲誠上表寶應元聖文武皇帝答曰汝以近臣護持釋教精勤久著誠效頗章所進鴿毛深可喜也所奏知
