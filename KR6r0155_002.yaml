body:
  text: 上都長安西明寺沙門釋圓照集凡表二十二首答制六首總二十八首謝贈故金剛三藏官號等表一首并答請捨衣鉢助僧道環修金閣寺制書一首請捨衣鉢同修聖玉華寺制書一首賀平周智光表一首請抽化度寺萬菩薩堂三長月念誦僧制一首請修臺山金閣玉華寺等巧匠放免追呼制一首請臺山五寺度人抽僧制一首請子翷法師化度寺開講制一首請降誕日度僧五人制一首請度掃灑先師龍門塔所僧制一首請御題先師塔額并設齊度人表一首并答謝恩命為先師設遠忌齊并賜茶表一首并答請降誕日度三僧制一首請光天寺東塔院充五臺山往來停止院制一首天下寺食堂中置文殊上座制一首大曆五年七月五日於太原設萬人齊制一首令不空三藏撿校同年七月十三日與三藏手詔一首請太原府至德寺置文殊院制一首同年九月四日又賜手詔一首請太原號令堂安像淨土院抽僧制一首請慧林法師於保壽寺講表一首謝恩賜大興善寺施戒方等并糧料表一首并答請廣智三藏登壇祠部告牒一首謝恩賜乳牛五頭并犢表一首并答謝贈故金剛三藏官號等表一首三藏沙門不空言奉今月一日制錫故大和上金剛三藏可贈開府儀同三司仍贈號大弘教三藏不空特進試鴻臚卿仍賜號大廣智三藏一雨自天潤流根葉圓毫發艷照及幽明捧戴傍徨悲喜交集不空誠懼誠喜以悽以懼不空聞十號者表德之殊稱九卿者象河之重位故大和上道洽傳燈誠以彰其遺烈不空法慚紹搆虛並荷於鴻私猶燕石之混光同齊竿之濫吹榮兼存歿寵及師資祇奉兢驚瞻言靦面況出家落彩本忘榮辱潔誠報國僧者通規陛下廣運金輪曲收瓦礫引安禪於中禁旌褒崇之殊禮雖負山無力而踐跡近賓虧高謝之法流點少欲之清躅是以面奏三讓言煩九重冀殷鑒於懇誠豈確然之不拔羊車稚子慚廣智而茫然鹿苑卑材愧鴻臚而甚矣無任感戴之至謹奉表陳謝以聞沙門不空誠懼誠喜謹言永泰元年十一月五日特進試鴻臚卿大廣智三藏興善寺沙門不空上表寶應元聖文武皇帝批和上道祕雙林功超正覺遠從天竺來布真言頃得歸依親承付囑褒崇之典禮秩攸先俾增印綬之榮式重師資之敬兼申寵贈庶表追榮也請捨衣鉢助僧道環修金閣寺制一首五臺山金閣寺右大興善寺沙門特進試鴻臚卿大廣智不空奏上件寺先聖書額寺宇未成准開元二十四年衢州僧道義至臺山所見文殊聖迹寺號金閣院有十三間居僧衆云有萬人臺殿門樓茲金所作登時圖畫一本進入在內天下百姓咸欲金閣寺成人誰不願令澤州僧道環日送供至山𨗈慕道義禪師所見之事發心奉為國家依圖造金閣寺院宇多少一如所見今夏起手工匠什物茲自營辦將滿先聖御額終成道義感通觀夫此僧志願非小或謂文殊所假俾樹勝因且五臺霛山寺額有五清涼華嚴佛光玉花四寺先成獨唯金閣一所未就既是聖迹誰不具瞻不空願捨衣鉢隨助道環建立盛事嘗恐歲不我與愆于宿心屢亦奏聞天恩矜允夫以文殊聖迹聖者為主結構金閣非陛下而誰棟梁者大廈是依股肱者元首所託共成一體和叶萬邦金閣斯崇非夫宰輔贊成軍客匡助百寮咸續千官共崇則何以表君臣之美以光金閣之大也保壽寺大德沙門含光奉使回臺恭修功德伏望便於造寺所奉宣聖旨祈所厥誠庶霛神照明以介景福康寧寰宇保祐聖躬如天恩允許請宣付所司中書門下牒大廣智不空三藏牒奉敕宜依牒至准敕故牒永泰二年五月一日牒中書侍郎平章事元載黃門侍郎平章事杜鴻漸黃門侍郎平章事王縉撿挍侍中使撿挍右僕射平章事使撿挍左僕射平章事李袍玉中書令使請捨衣鉢同修聖玉華寺制書一首五臺山聖玉華寺右特進試鴻臚卿大興善寺三藏沙門大廣智不空奏前件寺准乾元元年九月十一日敕興金閣寺同置不空先請自捨衣鉢以為創首伏望差當寺上座行滿准金閣例撿挍營造中書門下牒大廣智不空三藏牒奉敕宜依牒至准敕故牒大曆元年十一月二十一日牒中書侍郎平章事元載黃門侍郎平章事杜鴻漸黃門侍郎平章事王縉撿挍侍中李使撿挍右僕射平章事使撿挍左僕射平章事使中書令使賀平周智光表一首不空言伏以周智光敢負朝旨自冒天誅積惡滅身果見傳首慶流卛土喜契陽春蓋由陛下神算潛通睿謀密用武士猶未施其勇蒼生遽已獲其安寰宇轉清夷狄喪志是知聖王之力遂成無戰之功仁王之慈畢獲有情之命不空忝承渥澤殊增躍荷不勝欣慶之至謹奉表陳荷以聞不空誠歡誠喜謹言大曆二年正月十四日特進試鴻臚卿大興善寺三藏沙門大廣智不空上表寶應元聖文武皇帝批智光凶狂敢擾關鋪王師暫舉自有誅夷宗社威霛大聖敷祐師之護念氛梫永清所賀知請抽化度寺萬菩薩堂三長齊月念誦僧制一首化度寺文殊師利護國萬菩薩堂三長齊月念誦僧二七人大興善寺大德靜超大德慧霛化度寺大德法真大德智藏大德道岸大德菩提泥沙唐名義寬大德波羅檀唐名善岸大德談演西明寺大德光演大德摩訶衍興福寺大德達摩千福寺大德法崇慧日寺大德義成醴泉寺大德利言右特進試鴻臚卿大興善寺三藏沙門大廣智不空奏伏以化度寺護國萬菩薩堂並依臺山文殊所見乘雲駕象凌亂楹梁光明滿堂不異金閣奉去年十二月二十三日恩命賜香兼宣口敕命不空簡擇念誦大德及命寺主智藏專撿挍道場其前件大德等或業茂真言學通戒律或敷宣妙旨轉讀真乘望抽住於此中每年三長齊月精建道場為國念誦必有事故隨闕續填其堂內外施及功德一物已上茲請三網專句當冀不遺漏中書門下牒大廣智不空三藏牒祠部准此令史趙昌主事薰意郎中雀漪牒奉敕宜依牒至准敕故牒大曆二年二月十六日牒中書侍郎平章事元載黃門侍郎平章事杜鴻漸黃門侍郎平章事王縉撿校侍中李使撿校右僕射平章事使撿校左僕射平章事使中書令在使院請修臺山金閣玉華寺等巧匠放免追呼制一首代州五臺山聖金閣寺造寺都料僧純陀道仙法達木匠俟璨谷禮釗遺欽欣州空襄縣檀命暉五臺縣五茂林陽喜子唐林縣雍日新聖玉花寺造寺都料木匠殷𨑭雁門縣匠霍龍繁時縣釗如晏郭哲唐林縣韓清賈禮支阿八唐林縣張暉繁時縣修五臺山六處普通供養舍木匠丁修零定襄縣斑賓智義璨郭圭馬元李四師封杜兒五臺縣馬元哲右特進試鴻臚卿三藏沙門大廣智不空奏先奉恩命令含光撿挍造前件寺及普通供養處其所須材木當山自有既是靈跡事資巧匠前件匠等並遠近所推今見在山修造次第恐所營州縣或有追呼特望天恩許畢功德中書門下牒大廣智不空牒奉敕宜委雲京句當勿令追擾牒至准敕故牒大曆二年二月十六日牒中書侍郎平章事元載已下同七相請臺山五寺度人抽僧制一首代州五臺山金閣寺玉花清涼花嚴吳摩子等寺右特進試鴻臚卿大興善寺三藏沙門大廣智不空奏文殊聖跡自古攸仰今遇陛下特更增修精建伽藍恩命稠疊是可百神潛祐萬聖來歸靈蹤建興於斯為盛處既嚴潔人亦宜然艱難已來僧徒漸少或經行化物便住人間或蘭若隨緣周栖他處遂使時中禮懺鐘梵遞虧樹下禪龕蛛網交暗福田未廣有愧聖心伏乞天恩先在山中行人童子久精苦者寺別度二七人兼諸州抽道行僧一七人每寺相共滿三七人為國行道有闕續填金閣等五寺常轉仁王護國及密嚴經又吳摩子寺名且非便望改為大曆法花之寺常為國轉法花經同五寺例免差遣其所度人望委雲京將軍宗鳳朝與中使魏明秀又修功德沙門含光簡擇冀無偷濫又清涼寺為大聖文殊造閣已畢伏望天恩賜書一額永光來葉中書門下牒大廣智不空牒奉敕宜依牒至准敕故牒大曆二年三月二十六日牒中書侍郎平章事元載已下七相同上請子翷化度寺開講制書一首中書門下牒大廣智不空牒奉敕特進試鴻臚卿大興善寺三藏沙門大廣智不空奏請沙門子翷於化度寺萬菩薩堂開講者宜依牒至准敕故牒大曆二年六月二十八日牒中書侍郎平章事元載七相同上請降誕日度僧五人制一首行者畢數延年五十五無州貫誦梵本賢護三昧經一部并誦諸陀羅尼請法名惠達住莊嚴寺行者康守忠年四十三無州貫誦經一百二十紙并誦諸陀羅尼請法名惠觀住東京廣福寺大弘教三藏毗盧舍那院行者畢越延年四十三無州貫誦梵本楞伽經一部誦金剛般若經并諸陀羅尼請法名惠日住莊嚴寺童子石惠璨年十三無州貫誦梵本大吼雀王經一部誦隨求陀羅尼并經請法名惠光住西明寺童子羅詮年十五無州貫誦梵本出生無邊門經誦隨求陀羅尼呪并經請法名惠俊住西明寺右特進試鴻臚卿大興善寺三藏沙門大廣智不空奏前件行者童子等並素稟調柔器性淳礭服勤經戒諷誦真言志期出家精修報國今因降誕之日請度為僧各配住前件寺冀福資聖壽地久天長中書門下牒大廣智不空牒奉敕宜依牒至准敕故牒大曆二年十月十三日牒中書侍郎平章事元載黃門侍郎平章事杜鴻漸黃門侍郎平章事王縉兵部尚書平章事李使撿挍侍中李使撿挍右僕射平章事使中書令使請度掃灑先師龍門塔所僧制一首東京龍門故開府儀同三司大弘教三藏塔所掃灑無名僧惠恆年四十六俗姓張名景芒貫鄭州滎陽縣檀山鄉安信里父壞道為戶身無籍誦菩薩戒經一卷誦聲聞戒一卷誦法花經一部念誦為業住河南府廣福寺毗盧舍那塔院并向龍門塔所來往掃灑當院行者趙元及年三十五貫京兆府雲陽縣龍雲鄉修德里父貞觀為戶身無籍誦法花經一部誦維摩經一部誦菩薩戒經一卷誦金剛經一卷誦藥師經一卷誦彌陀經一卷誦金光明經四卷誦無常經一卷誦盂蘭盆經一卷住保壽寺法名惠翷行者田榮國年三十三貫京兆府萬年縣積福鄉積德里父懷常為戶身無籍誦大隨求真言誦尊勝陀羅尼誦阿彌陀陀羅尼誦法花經一部住總持寺法名惠濬童子李寶達年十三貫京兆府照應縣故疊鄉修文里父守信為戶誦法花經兩卷誦大隨求真言誦理趣般若經住大興善寺法名惠正右特進試鴻臚卿大興善寺三藏沙門大廣智不空奏前件無名僧等先嘗奉事故大和上服勤香火積有歲年志性柔和堅固無懈請與正名便送塔額住彼掃灑冀終罔極獲展師資行者童子等並久習真言兼誦經典不離本院業已成就伏乞與度俾勵修持中書門下牒大廣智不空牒奉敕宜依牒至准敕故牒大曆三年六月十三日牒中書令元假門下杜王同上謝御題先師塔額并設齊表一首并答沙門不空言不空早侍先大和上猥承㢡訓愧無升堂之哲謬忝入室之遇曼茶羅灌頂壇者萬行之宗密證之主將登覺路何莫由斯始先師所傳啓此方耳目惠燈罷照日月將深陛下思續耿光不遺疵賤詔開灌頂俾建道場才髣佛於存羊豈歸依之補處皇慈乃眷渥澤纍霑降五僧泥封雲隨髮落下千人天飯香任風吹況塔額親題桂諸伊落龍門之下更攢崛起之峯月輪之間恆聚沖飛之雁無任戴荷屏營之至謹附監使李憲誠奉表陳謝以聞沙門不空誠歡誠喜謹言大曆三年六月十三日特進試鴻臚鄉大興善寺三藏沙門大廣智不空上表寶應元聖文武皇帝批和上釋梵宗師人天歸仰慈悲智力拯拔生靈廣開壇場弘宣法要福資國土惠洽有情愧厚良多煩勞申謝謝恩命為先師設遠忌齊并賜荼表一首沙門不空言伏奉恩命今月十五日故大弘教三藏遠忌設千僧齊賜茶一百一十串伏戴殞悲啓